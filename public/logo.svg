<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Clip everything to a perfect circle -->
    <clipPath id="c"><circle cx="100" cy="100" r="100"/></clipPath>

    <!-- Radial gradient: bright center → deep indigo edge -->
    <radialGradient id="bg" cx="38%" cy="28%" r="80%">
      <stop offset="0%"   stop-color="#6366f1"/>
      <stop offset="48%"  stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </radialGradient>

    <!-- Top-left lens shine -->
    <radialGradient id="shine" cx="30%" cy="20%" r="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Waveform gradient: fades at edges -->
    <linearGradient id="wave" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%"   stop-color="#a5b4fc" stop-opacity="0"/>
      <stop offset="18%"  stop-color="#a5b4fc" stop-opacity="0.85"/>
      <stop offset="50%"  stop-color="#ffffff"  stop-opacity="1"/>
      <stop offset="82%"  stop-color="#a5b4fc" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#a5b4fc" stop-opacity="0"/>
    </linearGradient>

    <!-- Arc signal gradient -->
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>

    <!-- Soft glow filter for waveform -->
    <filter id="wglow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Glow for dots/arcs -->
    <filter id="dglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Drop shadow for depth -->
    <filter id="drop">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#1e1b4b" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="100" cy="102" r="97" fill="#4f46e5" opacity="0.18" filter="url(#drop)"/>

  <!-- Everything clipped to circle -->
  <g clip-path="url(#c)">

    <!-- Base fill -->
    <circle cx="100" cy="100" r="100" fill="url(#bg)"/>

    <!-- Top-left lens shine -->
    <circle cx="100" cy="100" r="100" fill="url(#shine)"/>

    <!-- Concentric ring texture (very subtle) -->
    <circle cx="100" cy="100" r="78" stroke="rgba(255,255,255,0.035)" stroke-width="22" fill="none"/>
    <circle cx="100" cy="100" r="56" stroke="rgba(255,255,255,0.045)" stroke-width="14" fill="none"/>

    <!-- Signal arcs — top-right quadrant -->
    <path d="M 100 36  A 64 64 0 0 1 164 100" stroke="url(#arc)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.55" filter="url(#dglow)"/>
    <path d="M 100 52  A 48 48 0 0 1 148 100" stroke="url(#arc)" stroke-width="2"   stroke-linecap="round" fill="none" opacity="0.40"/>
    <path d="M 100 68  A 32 32 0 0 1 132 100" stroke="url(#arc)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.28"/>

    <!-- Signal arcs — bottom-left mirror -->
    <path d="M 100 164 A 64 64 0 0 1 36  100" stroke="url(#arc)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.42" filter="url(#dglow)"/>
    <path d="M 100 148 A 48 48 0 0 1 52  100" stroke="url(#arc)" stroke-width="2"   stroke-linecap="round" fill="none" opacity="0.28"/>

    <!-- ★ Hero waveform (ECG/pulse → perfect for webhook delivery) -->
    <path d="M 22 100 L 48 100 L 63 65 L 78 135 L 91 80 L 100 100 L 110 100 L 120 120 L 130 82 L 142 100 L 178 100"
          stroke="url(#wave)" stroke-width="3.8"
          stroke-linecap="round" stroke-linejoin="round"
          fill="none" filter="url(#wglow)"/>

    <!-- Center peak dot -->
    <circle cx="100" cy="100" r="5.5" fill="white" opacity="0.96" filter="url(#dglow)"/>

    <!-- Signal endpoint dots -->
    <circle cx="164" cy="100" r="4"   fill="#a5b4fc" opacity="0.88" filter="url(#dglow)"/>
    <circle cx="36"  cy="100" r="4"   fill="#a5b4fc" opacity="0.72"/>

    <!-- Small accent sparkles -->
    <circle cx="157" cy="44"  r="2.8" fill="rgba(165,180,252,0.55)"/>
    <circle cx="43"  cy="156" r="2.8" fill="rgba(165,180,252,0.45)"/>
    <circle cx="163" cy="155" r="1.8" fill="rgba(165,180,252,0.30)"/>
    <circle cx="37"  cy="45"  r="1.8" fill="rgba(165,180,252,0.25)"/>

  </g>

  <!-- Outer rim highlight -->
  <circle cx="100" cy="100" r="99" stroke="rgba(255,255,255,0.13)" stroke-width="1.5" fill="none"/>
</svg>
